# argocd/prometheus-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 25.21.0
    helm:
      values: |
        server:
          retention: 24h
          resources:
            requests:
              memory: 400Mi
              cpu: 100m
            limits:
              memory: 600Mi
              cpu: 500m
          persistentVolume:
            enabled: false
          extraScrapeConfigs: |
            - job_name: fleet-api
              static_configs:
                - targets: ['fleet-api.fleetops.svc.cluster.local:8000']
              metrics_path: /metrics
        # Componentes no necesarios para el portfolio
        alertmanager:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        prometheus-pushgateway:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true