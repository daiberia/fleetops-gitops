apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleet-api
  namespace: argocd
  labels:
    app: fleet-api
    project: fleetops
spec:
  project: default
  source:
    repoURL: https://github.com/daiberia/fleetops-gitops.git
    targetRevision: main
    path: apps/fleet-api
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
