# argocd/monitoring-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.9.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            retention: 24h
            resources:
              requests:
                memory: 400Mi
                cpu: 100m
              limits:
                memory: 600Mi
                cpu: 500m
            additionalScrapeConfigs:
              - job_name: fleet-api
                static_configs:
                  - targets: ['fleet-api.fleetops.svc.cluster.local:8000']
                metrics_path: /metrics
        grafana:
          adminPassword: "***REMOVED***"
          resources:
            requests:
              memory: 150Mi
              cpu: 50m
            limits:
              memory: 250Mi
              cpu: 200m
          service:
            type: ClusterIP
        alertmanager:
          enabled: false
        nodeExporter:
          enabled: true
        kubeStateMetrics:
          enabled: true
        prometheusOperator:
          resources:
            requests:
              memory: 100Mi
              cpu: 50m
            limits:
              memory: 200Mi
              cpu: 200m
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true