apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-worker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/daiberia/fleetops-gitops
    targetRevision: HEAD
    path: apps/telemetry-worker
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false