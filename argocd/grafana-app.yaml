# argocd/grafana-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 7.3.9
    helm:
      values: |
        admin:
          existingSecret: "grafana-admin-secret"
          userKey: "admin-user"
          passwordKey: "admin-password"
        extraSecretMounts:
          - name: grafana-secrets-mount
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: "grafana-secrets"
            mountPath: /mnt/secrets-store
            readOnly: true
        resources:
          requests:
            memory: 150Mi
            cpu: 50m
          limits:
            memory: 250Mi
            cpu: 200m
        service:
          type: ClusterIP
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-server.monitoring.svc.cluster.local
                isDefault: true
        persistence:
          enabled: false
        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - grafana.51.103.15.240.nip.io
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.51.103.15.240.nip.io
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true