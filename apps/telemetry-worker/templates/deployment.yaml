apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-worker
  namespace: fleetops
  labels:
    app: telemetry-worker
    managed-by: argocd
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: telemetry-worker
  template:
    metadata:
      labels:
        app: telemetry-worker
    spec:
      serviceAccountName: fleet-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: telemetry-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fleetops-secrets
                  key: fleetops-db-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fleetops-secrets
                  key: fleetops-jwt-secret
            - name: SIMULATION_INTERVAL_SECONDS
              value: "{{ .Values.env.simulationIntervalSeconds }}"
            - name: FUEL_CONSUMPTION_RATE
              value: "{{ .Values.env.fuelConsumptionRate }}"
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
      restartPolicy: Always