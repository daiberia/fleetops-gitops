apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fleetops-secrets
  namespace: fleetops
spec:
  provider: azure
  parameters:
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "{{ .Values.keyvault.clientId }}"
    keyvaultName: "daiberia-fleetops-kv"
    tenantId: "{{ .Values.keyvault.tenantId }}"
    objects: |
      array:
        - |
          objectName: fleetops-db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: fleetops-db-url
          objectType: secret
          objectVersion: ""
        - |
          objectName: fleetops-jwt-secret
          objectType: secret
          objectVersion: ""
  secretObjects:
    - secretName: fleetops-secrets
      type: Opaque
      data:
        - objectName: fleetops-db-password
          key: fleetops-db-password
        - objectName: fleetops-db-url
          key: fleetops-db-url
        - objectName: fleetops-jwt-secret
          key: fleetops-jwt-secret
