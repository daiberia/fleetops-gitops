# cluster/grafana-secrets.yaml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: grafana-secrets
  namespace: monitoring
spec:
  provider: azure
  parameters:
    keyvaultName: daiberia-fleetops-kv
    objects: |
      array:
        - |
          objectName: fleetops-grafana-user
          objectType: secret
          objectVersion: ""
        - |
          objectName: fleetops-grafana-password
          objectType: secret
          objectVersion: ""
    tenantId: "***TENANT_ID***"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "***CLIENT_ID***"
  secretObjects:
  - secretName: grafana-admin-secret
    type: Opaque
    data:
    - objectName: fleetops-grafana-user
      key: admin-user
    - objectName: fleetops-grafana-password
      key: admin-password
